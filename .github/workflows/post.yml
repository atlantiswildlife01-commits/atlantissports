name: Atlantis Sports — Instagram Reels (10x/day)

on:
  schedule:
    - cron: '40 0 * * *'    # IST 06:10
    - cron: '10 2 * * *'    # IST 07:40
    - cron: '40 3 * * *'    # IST 09:10
    - cron: '10 5 * * *'    # IST 10:40
    - cron: '40 6 * * *'    # IST 12:10
    - cron: '10 8 * * *'    # IST 13:40
    - cron: '40 9 * * *'    # IST 15:10
    - cron: '40 11 * * *'   # IST 17:10
    - cron: '40 13 * * *'   # IST 19:10
    - cron: '40 15 * * *'   # IST 21:10
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System packages
        run: sudo apt-get install -y fonts-noto fonts-noto-extra ffmpeg

      - name: Install dependencies
        run: pip install ddgs groq requests Pillow python-dotenv PyNaCl gtts edge-tts yt-dlp

      - name: Configure git
        run: |
          git config --global user.email "bot@atlantissports.ai"
          git config --global user.name "Atlantis Sports Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Post sports reels
        env:
          GROQ_API_KEY:                    ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:                  ${{ secrets.PEXELS_API_KEY }}
          IMGBB_API_KEY:                   ${{ secrets.IMGBB_API_KEY }}
          PIXABAY_API_KEY:                 ${{ secrets.PIXABAY_API_KEY }}
          GH_PAT:                          ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:               ${{ github.repository }}
          GITHUB_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          SPORTS_INSTAGRAM_ACCESS_TOKEN:   ${{ secrets.SPORTS_INSTAGRAM_ACCESS_TOKEN }}
          SPORTS_INSTAGRAM_ACCOUNT_ID:     ${{ secrets.SPORTS_INSTAGRAM_ACCOUNT_ID }}
        run: python agent.py